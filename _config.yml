# Site Settings
title: cbev
subtitle: "offensive security writeups"
description: >-
  Offensive security writeups covering Active Directory, Kerberos abuse,
  web application exploitation, and HackTheBox walkthroughs.
url: "https://cbev0x.github.io"
baseurl: ""
repository: "cbev0x/cbev0x.github.io"

# seo optimization
google_site_verification: "4WjVA99rHPRNOxBjk98rg5g9E8DHO0sE7g0ZjIpbRuY"

# Theme
remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "contrast"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# Pagination
paginate: 10
paginate_path: /page:num/

# Author
author:
  name: "cbev"
  avatar: "/assets/img/favicons/cat.png"
  bio: "OSCP · Active Directory · Web AppSec · HTB"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/cbev0x"
    - label: "HackTheBox"
      icon: "fas fa-fw fa-cube"
      url: "https://app.hackthebox.com/users/2669350"
    - label: "TryHackMe"
      icon: "fas fa-fw fa-shield-alt"
      url: "https://tryhackme.com/p/cbev"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/chase-bevan-thomas-59b105363/"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/cbev0x"
    - label: "HackTheBox"
      icon: "fas fa-fw fa-cube"
      url: "https://app.hackthebox.com/users/2669350"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/chase-bevan-thomas-59b105363/"

# Reading Files
include:
  - _pages
  - .htaccess

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache

# Markdown & Syntax Highlighting
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    block:
      line_numbers: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Collections / Defaults
defaults:
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      show_date: true
      share: false
      related: true
      toc: true
      toc_sticky: true
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Search
search: true
search_full_content: false

# SEO
twitter:
  username: ""
og_image: "/assets/img/favicons/cat.png"

# Build
future: true
show_drafts: false
